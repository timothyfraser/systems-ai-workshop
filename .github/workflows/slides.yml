name: Deploy Slides

# Builds every <folder>/slides/slides.md deck with Marp, copies every
# <folder>/output/ folder of real example results, and publishes the whole
# lot to GitHub Pages.
# One-time: repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "**/slides/**"
      - "**/output/**"
      - ".github/workflows/slides.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build decks + gallery with Marp
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p _site

          # Landing page header
          {
            echo '<!doctype html><meta charset="utf-8">'
            echo '<title>Systems AI-X — Slides &amp; Outputs</title>'
            echo '<style>body{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;max-width:720px;margin:48px auto;padding:0 16px;color:#1a1a2e}h1{color:#b31b1b}h2{color:#8a1414;margin-top:1.6em;font-size:1.1em}a{color:#b31b1b;text-decoration:none}a:hover{text-decoration:underline}li{margin:.5em 0;font-size:1.05em}.muted{color:#5a6472;font-size:.95em}</style>'
            echo '<h1>🛠️ Systems AI-X — Slides &amp; Outputs</h1>'
            echo '<h2>🎞️ Slide decks</h2><ul>'
          } > _site/index.html

          # 1) Render each deck
          for f in */slides/slides.md; do
            mod="$(dirname "$(dirname "$f")")"
            out="${mod}.html"
            echo "Rendering $f → _site/${out}"
            npx -y @marp-team/marp-cli@latest "$f" -o "_site/${out}" --html
            echo "<li>🎞️ <a href=\"${out}\">${mod}</a></li>" >> _site/index.html
          done
          echo '</ul>' >> _site/index.html

          # 2) Copy each folder's real example outputs verbatim, and list the
          #    human-viewable HTML in a gallery so "open ↗" links resolve.
          echo '<h2>🖼️ Real example outputs</h2><ul>' >> _site/index.html
          for d in */output; do
            mod="$(dirname "$d")"
            echo "Copying $d → _site/${d}"
            mkdir -p "_site/${d}"
            cp -R "$d/." "_site/${d}/"
            for html in "$d"/*.html; do
              name="$(basename "$html")"
              echo "<li>🖼️ <a href=\"${d}/${name}\">${mod} · ${name}</a></li>" >> _site/index.html
            done
          done
          echo '</ul>' >> _site/index.html
          echo '<p class="muted">Generated from real Claude Desktop sessions in this repo.</p>' >> _site/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
